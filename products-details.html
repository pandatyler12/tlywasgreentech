<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - Aquaspark Generator</title>
    <style>
        :root {
            --green-dark: #1b4d3e;
            --green: #2a7a4a;
            --green-light: #a5d6a7;
            --green-lighter: #dcedc8;
            --white: #ffffff;
            --gray-dark: #2f2f2f;
            --gray-medium: #4a4a4a;
            --gray-light: #6b7280;
            --font-heading: 'Poppins', sans-serif;
            --font-body: 'Inter', sans-serif;
            --transition: 0.3s ease;
            --border-radius: 12px;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--green-lighter);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .modal-content {
            background-color: var(--white);
            border-radius: var(--border-radius);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            padding: 2rem;
            width: 90%;
            max-width: 400px;
            text-align: center;
            position: relative;
            border: 2px solid var(--green);
        }

        h2 {
            font-family: var(--font-heading);
            color: var(--green-dark);
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
        }

        .product-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: var(--border-radius);
            margin-bottom: 1.5rem;
            border: 1px solid var(--green-light);
        }

        .product-description {
            color: var(--gray-medium);
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .quantity-control {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .quantity-control label {
            font-weight: 600;
            color: var(--green-dark);
        }

        .quantity-control input {
            width: 60px;
            padding: 0.5rem;
            border: 2px solid var(--green-light);
            border-radius: var(--border-radius);
            text-align: center;
            font-weight: bold;
        }

        .price-display {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--green-dark);
            margin-bottom: 1.5rem;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .add-to-cart {
            background-color: var(--green);
            color: var(--white);
            padding: 0.8rem;
            border: none;
            border-radius: var(--border-radius);
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            font-size: 1rem;
        }

        .add-to-cart:hover {
            background-color: var(--green-dark);
            transform: translateY(-2px);
        }

        .close-btn {
            background-color: var(--white);
            color: var(--green-dark);
            padding: 0.8rem;
            border: 2px solid var(--green);
            border-radius: var(--border-radius);
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            font-size: 1rem;
        }

        .close-btn:hover {
            background-color: var(--green-light);
            color: var(--white);
        }
    </style>
</head>
<body>
    <!-- Aquaspark Product -->
    <div class="modal-content" id="aquaspark-product">
        <h2>Aquaspark Generator</h2>
        <img class="product-image" src="aquaspark generator.jpg" alt="Aquaspark Generator">
        <p class="product-description">A powerful generator for sustainable energy with advanced water-powered technology. Perfect for off-grid power solutions.</p>
        
        <div class="quantity-control">
            <label for="aquaspark-quantity">Quantity:</label>
            <input type="number" id="aquaspark-quantity" value="1" min="1">
        </div>
        
        <div class="price-display">
            Total Price: <span id="aquaspark-price">$400.00</span>
        </div>
        
        <div class="button-group">
            <button class="add-to-cart">Add to Cart</button>
            <button class="close-btn" onclick="closeModal()">Close</button>
        </div>
    </div>

    <script>
        // Price calculation for Aquaspark Generator
        const aquasparkPrice = 400.00;

        const quantityInput = document.getElementById('aquaspark-quantity');
        const priceElement = document.getElementById('aquaspark-price');

        function updatePrice() {
            const quantity = parseInt(quantityInput.value);
            priceElement.textContent = `$${(aquasparkPrice * quantity).toFixed(2)}`;
        }

        quantityInput.addEventListener('change', updatePrice);
        updatePrice(); // Initialize

        function closeModal() {
            // Close modal logic here (e.g., hide the modal or redirect)
            console.log("Modal closed");
        }
    </script>
</body>
</html>
